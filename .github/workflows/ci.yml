name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Ruff
        run: ruff check src tests
      - name: Pytest
        run: pytest

  dotnet:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/csharp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Restore
        run: dotnet restore DesignPatterns.sln
      - name: Build
        run: dotnet build DesignPatterns.sln --no-restore -c Release
      - name: Test
        run: dotnet test DesignPatterns.sln --no-build -c Release --verbosity normal
